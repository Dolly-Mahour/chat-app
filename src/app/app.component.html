<div class="container-fluid g-0  h-100 w-100">

    <div class="w-5 d-flex flex-column justify-content-between sideBar-bg border-end">
      <div class="row g-0 h-50 py-5">
        <svg class="h-30px" version="1.1" id="Icons" xmlns="http://www.w3.org/2000/svg"

            .st1 {
              fill: none;
              stroke: #000000;
              stroke-width: 2;
              stroke-linecap: round;
              stroke-linejoin: round;
              stroke-miterlimit: 10;

              fill: none;

              stroke-width: 2;
              stroke-miterlimit: 10;

        <svg fill="#000000" width="30px" height="30px" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

          <g data-name="Layer 1">

            <g data-name="message-circle">

              <circle cx="12" cy="12" r="1"></circle>

              <circle cx="16" cy="12" r="1"></circle>

              <circle cx="8" cy="12" r="1"></circle>

              <path

            d="M3 19H1V18C1 16.1362 2.27477 14.57 4 14.126M6 10.8293C4.83481 10.4175 4 9.30623 4 8.00001C4 6.69379 4.83481 5.58255 6 5.17072M21 19H23V18C23 16.1362 21.7252 14.57 20 14.126M18 5.17072C19.1652 5.58255 20 6.69379 20 8.00001C20 9.30623 19.1652 10.4175 18 10.8293M10 14H14C16.2091 14 18 15.7909 18 18V19H6V18C6 15.7909 7.79086 14 10 14ZM15 8C15 9.65685 13.6569 11 12 11C10.3431 11 9 9.65685 9 8C9 6.34315 10.3431 5 12 5C13.6569 5 15 6.34315 15 8Z"

      </div>
      <div class="row g-0 h-25 py-4 d-flex flex-column justify-content-between align-items-center">

        </svg>
        <div class="profile bg-success">

        </div>
      </div>

    </div>
    <div class="col-lg-5 col-md-6 col-sm-12 bg-success">
      <div class="row g-0 h-100px bg-white d-flex align-items-center justify-content-between px-3">
        <p class="mb-0 fw-bold fs-3 fst-italic w-auto ">ChitChat</p>
        <div class="w-15 d-flex justify-content-between">
          <svg width="30px" height="30px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 12H12M15 12H12M12 12V9M12 12V15" stroke="#000000" stroke-width="1.5" stroke-linecap="round"
              stroke-linejoin="round"></path>
            <path
              d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 13.8214 2.48697 15.5291 3.33782 17L2.5 21.5L7 20.6622C8.47087 21.513 10.1786 22 12 22Z"
              stroke="#000000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
          <svg width="25px" height="25px" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M19 16a3 3 0 0 1-3 3 3 3 0 0 1-3-3 3 3 0 0 1 3-3 3 3 0 0 1 3 3zm0 13a3 3 0 0 1-3 3 3 3 0 0 1-3-3 3 3 0 0 1 3-3 3 3 0 0 1 3 3zm0-26a3 3 0 0 1-3 3 3 3 0 0 1-3-3 3 3 0 0 1 3-3 3 3 0 0 1 3 3z"
              fill="#373737" />
          </svg>
        </div>
      </div>
    </div>
    <div class="col bg-primary h-100 w-100 border-start">
      <div class="h-100 w-100 bg-danger">
        <div class="h-100px bg-white d-flex align-items-center justify-content-between px-3">
          <div class="d-flex align-items-center">
            <div class="profile bg-warning me-3"></div>
            <div>
              <p>DOLLY</p>
              <p>online</p>
              <!-- <p>last seen today at 2:50pm</p> -->
            </div>
          </div>
          <div class="w-15 d-flex justify-content-between">
           <p (click)="startCall()">call</p>
            <svg width="25px" height="25px" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M19 16a3 3 0 0 1-3 3 3 3 0 0 1-3-3 3 3 0 0 1 3-3 3 3 0 0 1 3 3zm0 13a3 3 0 0 1-3 3 3 3 0 0 1-3-3 3 3 0 0 1 3-3 3 3 0 0 1 3 3zm0-26a3 3 0 0 1-3 3 3 3 0 0 1-3-3 3 3 0 0 1 3-3 3 3 0 0 1 3 3z"
                fill="#373737" />
            </svg>
          </div>
        </div>
        <div class="w-100 bg-warning">
          <div *ngFor="let msg of ws.messages">
            {{ msg.message }}
          </div>
          <br>
        </div>
        <div class="h-50px bg-white rounded-pill center-elements">
          <input class="messageInput" [(ngModel)]="message" placeholder="Type message">
          <button (click)="send()" class="btn p-2 bg-success sendButton rounded-circle center-elements">
            <svg fill="#fff" width="40px" height="40px" viewBox="0 0 32 32" id="icon"
              xmlns="http://www.w3.org/2000/svg">
              <defs>
                <style>
                  .cls-1 {
                    fill: none;
                  }
                </style>
              </defs>
              <title>send--filled</title>
              <path
                d="M27.45,15.11l-22-11a1,1,0,0,0-1.08.12,1,1,0,0,0-.33,1L6.69,15H18v2H6.69L4,26.74A1,1,0,0,0,5,28a1,1,0,0,0,.45-.11l22-11a1,1,0,0,0,0-1.78Z" />
              <rect id="_Transparent_Rectangle_" data-name="&lt;Transparent Rectangle&gt;" class="cls-1" width="32"
                height="32" />
            </svg>
          </button>
        </div>

      </div>

    </div>
  </div>
</div>
